<!doctype html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="x-apple-disable-message-reformatting" />
    <title>Confirm your signup</title>
  </head>
  <body style="margin:0;padding:0;background-color:#f4f7fb;">
    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#f4f7fb;padding:24px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width:600px;background-color:#0f1923;border-radius:16px;overflow:hidden;">
            <tr>
              <td style="padding:24px 28px;background:linear-gradient(135deg,#13283d 0%,#0f1923 100%);border-bottom:1px solid rgba(255,255,255,0.08);">
                <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                  <tr>
                    <td style="vertical-align:middle;">
                      <img
                        src="{{ .SiteURL }}/vara-logo.png"
                        width="34"
                        height="54"
                        alt="Vara"
                        style="display:block;border:0;outline:none;text-decoration:none;height:auto;"
                      />
                    </td>
                    <td style="vertical-align:middle;padding-left:12px;">
                      <p style="margin:0;font-family:Arial,sans-serif;font-size:18px;font-weight:700;letter-spacing:0.08em;color:#ffffff;">
                        VARA
                      </p>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <tr>
              <td style="padding:32px 28px 18px 28px;">
                <p style="margin:0 0 12px 0;font-family:Arial,sans-serif;font-size:12px;line-height:1.4;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#2d7ff9;">
                  Account verification
                </p>
                <h2 style="margin:0;font-family:Arial,sans-serif;font-size:28px;line-height:1.25;color:#ffffff;">
                  Confirm your signup
                </h2>
              </td>
            </tr>

            <tr>
              <td style="padding:0 28px 28px 28px;">
                <p style="margin:0 0 22px 0;font-family:Arial,sans-serif;font-size:16px;line-height:1.6;color:#c5d3e3;">
                  Thanks for signing up to Vara. Please confirm your email address to activate your account.
                </p>

                <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:0 0 24px 0;">
                  <tr>
                    <td align="center" bgcolor="#2d7ff9" style="border-radius:10px;">
                      <a
                        href="{{ .ConfirmationURL }}"
                        style="display:inline-block;padding:14px 22px;font-family:Arial,sans-serif;font-size:15px;font-weight:700;line-height:1;text-decoration:none;color:#ffffff;"
                      >
                        Confirm your email
                      </a>
                    </td>
                  </tr>
                </table>

                <p style="margin:0 0 8px 0;font-family:Arial,sans-serif;font-size:13px;line-height:1.5;color:#8aa1ba;">
                  If the button does not work, copy and paste this link into your browser:
                </p>
                <p style="margin:0 0 24px 0;word-break:break-all;font-family:Arial,sans-serif;font-size:13px;line-height:1.6;color:#9fc2f6;">
                  {{ .ConfirmationURL }}
                </p>
              </td>
            </tr>

            <tr>
              <td style="padding:18px 28px 26px 28px;border-top:1px solid rgba(255,255,255,0.08);">
                <p style="margin:0;font-family:Arial,sans-serif;font-size:12px;line-height:1.5;color:#6c8299;">
                  Vara, regulation decoded.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
